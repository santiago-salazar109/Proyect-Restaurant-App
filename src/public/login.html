<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login | Restaurante</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #1f4037, #99f2c8);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-container {
      background-color: #ffffff;
      width: 350px;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
    }

    .login-container h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #333;
    }

    .login-container img {
      display: block;
      margin: 0 auto 15px;
      width: 80px;
    }

    label {
      font-weight: bold;
      display: block;
      margin-top: 10px;
      color: #555;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    input:focus {
      outline: none;
      border-color: #1f4037;
    }

    button {
      width: 100%;
      margin-top: 20px;
      padding: 12px;
      border: none;
      border-radius: 5px;
      background-color: #1f4037;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background-color: #16362f;
    }

    .error {
      margin-top: 15px;
      color: red;
      text-align: center;
      display: none;
    }
  </style>
</head>

<body>

    <div class="login-container">
        <div class="login-card">
           <img src="Img/logo.png" class="logo-login">
            <h1>Inicio de sesión</h1>

            <form id="loginForm">
                <label>Email</label>
                <input type="email" id="email" required>

                <label>Contraseña</label>
                <input type="password" id="password" required>

                <button type="submit">Ingresar</button>
            </form>

            <p id="mensaje"></p>
        </div>
    </div>

    <script src="login.js"></script>
</body>

</html>
