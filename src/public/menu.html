<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Menú | GastroBar El Buen Sabor</title>

    <style>

        body{
            margin:0;
            font-family: Arial, Helvetica, sans-serif;

            background-image: url("Img/Dashboard.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            min-height: 100vh;
        }

        .contenedor{

            background: rgba(0,0,0,0.80);
            min-height: 100vh;
            padding: 30px;
            color:white;

        }

        .header{

            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:30px;

        }

        h1{
            margin:0;
        }

        .btn{

            background-color:#28a745;
            border:none;
            padding:10px 15px;
            color:white;
            border-radius:8px;
            cursor:pointer;
            font-weight:bold;
            transition:0.3s;

        }

        .btn:hover{

            background-color:#218838;

        }

        .btn-danger{

            background-color:#dc3545;

        }

        .btn-danger:hover{

            background-color:#c82333;

        }

        .formulario{

            background: rgba(255,255,255,0.08);
            padding:20px;
            border-radius:10px;
            margin-bottom:30px;

        }

        input{

            padding:10px;
            margin-right:10px;
            border-radius:6px;
            border:none;
            outline:none;

        }

        .productos{

            display:grid;
            grid-template-columns: repeat(auto-fit,minmax(220px,1fr));
            gap:20px;

        }

        .producto{

            background:white;
            color:black;
            border-radius:10px;
            overflow:hidden;
            box-shadow:0 4px 10px rgba(0,0,0,0.3);

        }

        .producto img{

            width:100%;
            height:150px;
            object-fit:cover;

        }

        .producto-info{

            padding:15px;
            text-align:center;

        }

        .producto-info h3{

            margin:0;
        }

        .producto-info p{

            font-weight:bold;
            margin:10px 0;

        }

    </style>

</head>
<body>

<div class="contenedor">

    <div class="header">

        <h1>Menú de productos</h1>

        <button id="volver" class="btn">
            Volver al dashboard
        </button>

    </div>


    <div class="formulario">

        <h2>Agregar producto</h2>

        <input type="text" id="titulo" placeholder="Nombre del producto">

        <input type="number" id="precio" placeholder="Precio">

        <button id="agregar" class="btn">
            Agregar
        </button>

    </div>


    <div>

        <h2>Lista de productos</h2>

        <div id="listaProductos" class="productos"></div>

    </div>

</div>


<script>

    // VALIDAR SESIÓN
    const empleado = JSON.parse(localStorage.getItem("empleado"));

    if(!empleado){

        window.location.href="login.html";

    }



    // CLASE PRODUCTO
    class Producto{

        constructor(id,titulo,precio){

            this.id=id;
            this.titulo=titulo;
            this.precio=precio;

        }


        render(onDelete){

            const div=document.createElement("div");

            div.className="producto";


            div.innerHTML=`

                <img src="Img/producto-default.jpg">

                <div class="producto-info">

                    <h3>${this.titulo}</h3>

                    <p>$${this.precio}</p>

                </div>

            `;


            const btn=document.createElement("button");

            btn.textContent="Eliminar";

            btn.className="btn btn-danger";

            btn.style.margin="10px";

            btn.onclick=()=>onDelete(this.id);


            div.appendChild(btn);

            return div;

        }

    }



    // SERVICIO PRODUCTOS
    class ProductoService{

        constructor(lista){

            this.lista=lista;
            this.productos=[];

        }


        async cargarProductos(){

            const res=await fetch("/productos");

            const data=await res.json();


            this.productos=data.map(p=>

                new Producto(p.id,p.titulo,p.precio)

            );


            this.mostrar();

        }


        async agregarProducto(titulo,precio){

            await fetch("/productos",{

                method:"POST",

                headers:{

                    "Content-Type":"application/json"

                },

                body:JSON.stringify({titulo,precio})

            });


            this.cargarProductos();

        }


        async eliminarProducto(id){

            await fetch(`/productos/${id}`,{

                method:"DELETE"

            });


            this.cargarProductos();

        }


        mostrar(){

            this.lista.innerHTML="";


            this.productos.forEach(p=>{

                this.lista.appendChild(

                    p.render(id=>this.eliminarProducto(id))

                );

            });

        }

    }



    // EJECUCIÓN

    const lista=document.getElementById("listaProductos");

    const servicio=new ProductoService(lista);


    servicio.cargarProductos();



    document.getElementById("agregar").onclick=()=>{

        const titulo=document.getElementById("titulo").value;

        const precio=document.getElementById("precio").value;


        if(!titulo||!precio){

            alert("Completa los campos");

            return;

        }


        servicio.agregarProducto(titulo,precio);


        document.getElementById("titulo").value="";

        document.getElementById("precio").value="";

    };



    document.getElementById("volver").onclick=()=>{

        window.location.href="dashboard.html";

    };

</script>

</body>
</html>
